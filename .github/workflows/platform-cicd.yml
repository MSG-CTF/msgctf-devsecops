name: 플랫폼 CI/CD

on:
  push:
    branches:
      - main
      - master
    paths:
      - frontend/**
      - backend/**
      - runtime/**
      - scheduler/**
      - k8s/**
      - .github/workflows/platform-cicd.yml
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        component: [frontend, backend, runtime, scheduler]
    steps:
      - name: 저장소 가져오기
        uses: actions/checkout@v4

      - name: 컴포넌트 테스트 실행
        run: |
          if [ -f "${{ matrix.component }}/Makefile" ]; then
            make -C "${{ matrix.component }}" test
          elif [ -f "${{ matrix.component }}/package.json" ]; then
            npm --prefix "${{ matrix.component }}" ci
            npm --prefix "${{ matrix.component }}" test
          elif [ -f "${{ matrix.component }}/requirements.txt" ]; then
            python -m pip install -r "${{ matrix.component }}/requirements.txt"
            python -m pytest "${{ matrix.component }}"
          else
            echo "${{ matrix.component }}에 실행할 테스트가 없습니다"
          fi

  build-scan-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        component: [frontend, backend, runtime, scheduler]
    steps:
      - name: 저장소 가져오기
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks 검사
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            ghcr.io/gitleaks/gitleaks:latest \
            dir /repo --redact --verbose

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: GHCR 이미지 이름 설정
        id: image
        env:
          COMPONENT: ${{ matrix.component }}
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "image=${REGISTRY}/${owner}/msgctf-${COMPONENT}" >> "$GITHUB_OUTPUT"

      - name: 검사할 이미지 빌드
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }}
          load: true
          tags: ${{ steps.image.outputs.image }}:${{ github.sha }}

      - name: Trivy 이미지 차단 검사
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          version: v0.72.0
          image-ref: ${{ steps.image.outputs.image }}:${{ github.sha }}
          format: table
          scanners: vuln
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Trivy SARIF 생성
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          version: v0.72.0
          image-ref: ${{ steps.image.outputs.image }}:${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.component }}.sarif
          scanners: vuln
          ignore-unfixed: true
          exit-code: "0"

      - name: Trivy SARIF 업로드
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.component }}.sarif

      - name: GHCR 로그인
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 검사 통과 이미지를 GHCR에 push
        if: github.event_name != 'pull_request'
        env:
          IMAGE: ${{ steps.image.outputs.image }}
        run: |
          docker tag "${IMAGE}:${GITHUB_SHA}" "${IMAGE}:latest"
          docker push "${IMAGE}:${GITHUB_SHA}"
          docker push "${IMAGE}:latest"

      - name: push된 이미지 digest 추출
        id: digest
        if: github.event_name != 'pull_request'
        env:
          IMAGE: ${{ steps.image.outputs.image }}
        run: |
          digest="$(docker buildx imagetools inspect "${IMAGE}:${GITHUB_SHA}" --format '{{json .Manifest.Digest}}' | tr -d '"')"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

  deploy-gke:
    needs: build-scan-push
    if: github.event_name != 'pull_request' && vars.ENABLE_GKE_DEPLOY == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: 저장소 가져오기
        uses: actions/checkout@v4

      - name: Google Cloud 인증
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: gcloud 설정
        uses: google-github-actions/setup-gcloud@v2

      - name: GKE credential 가져오기
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER }}
          location: ${{ secrets.GKE_LOCATION }}

      - name: 플랫폼 Kubernetes manifest 배포
        run: |
          image_prefix="${REGISTRY}/${GITHUB_REPOSITORY_OWNER,,}"
          kubectl apply -f k8s/base/namespaces.yaml
          kubectl apply -f k8s/platform/
          kubectl set image deployment/frontend frontend="${image_prefix}/msgctf-frontend:${GITHUB_SHA}" -n platform
          kubectl set image deployment/backend backend="${image_prefix}/msgctf-backend:${GITHUB_SHA}" -n platform
          kubectl set image deployment/runtime runtime="${image_prefix}/msgctf-runtime:${GITHUB_SHA}" -n platform
          kubectl set image deployment/scheduler scheduler="${image_prefix}/msgctf-scheduler:${GITHUB_SHA}" -n platform
          kubectl rollout status deployment/frontend -n platform --timeout=120s
          kubectl rollout status deployment/backend -n platform --timeout=120s
          kubectl rollout status deployment/runtime -n platform --timeout=120s
          kubectl rollout status deployment/scheduler -n platform --timeout=120s
